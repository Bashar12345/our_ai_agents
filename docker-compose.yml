services:
  saas-intelligence-vault:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saas-intelligence-vault
    restart: unless-stopped
    environment:
      PORT: 8001
      FLASK_DEBUG: 1
    volumes:
      - ./:/app
    command: sh -c "gunicorn --bind 0.0.0.0:$${PORT} --workers 2 --threads 4 --timeout 120 --reload app:app"
    ports:
      - "${HOST_PORT:-8001}:8001"